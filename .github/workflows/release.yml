name: Build release bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New Version"
        required: true
      is_major:
        description: "Major update"
        required: false
        type: boolean
        default: false
      force_dotnet_build:
        description: "Force .NET rebuild"
        required: false
        type: boolean
        default: false
      force_npm_install:
        description: "Force fresh npm install"
        required: false
        type: boolean
        default: false
      force_cargo_clean:
        description: "Force cargo clean"
        required: false
        type: boolean
        default: false
      force_nextjs_build:
        description: "Force Next.js rebuild"
        required: false
        type: boolean
        default: false

run-name: Build release ${{ github.event.inputs.version }}

permissions:
  contents: write
  pull-requests: write

jobs:
  validate_version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.normalize_new_version.outputs.new_version }}
      previous_version: ${{ steps.get_previous_version.outputs.previous_version }}
    steps:
      - name: Get latest release version
        id: get_previous_version
        run: |
          PREVIOUS_VERSION=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "Found previous version: $PREVIOUS_VERSION"
          echo "previous_version=$PREVIOUS_VERSION" >> $GITHUB_OUTPUT

      - name: Normalize new version
        id: normalize_new_version
        run: |
          RAW_VERSION="${{ github.event.inputs.version }}"
          NORMALIZED_VERSION="${RAW_VERSION#v}"
          echo "new_version=$NORMALIZED_VERSION" >> $GITHUB_OUTPUT

      - name: Validate semantic version format
        id: validate_format
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ steps.normalize_new_version.outputs.new_version }}

      - name: Validate version increment
        uses: actions/github-script@v8
        with:
          script: |
            const prevVersion = '${{ steps.get_previous_version.outputs.previous_version }}'.replace(/^v/, '');
            const newVersion = '${{ steps.normalize_new_version.outputs.new_version }}';
            
            const [prevMajor, prevMinor, prevPatch] = prevVersion.split('.').map(Number);
            const [newMajor, newMinor, newPatch] = newVersion.split('.').map(Number);
            
            // Check if it's a valid increment
            const isMajor = newMajor > prevMajor && newMinor === 0 && newPatch === 0;
            const isMinor = newMajor === prevMajor && newMinor > prevMinor && newPatch === 0;
            const isPatch = newMajor === prevMajor && newMinor === prevMinor && newPatch === prevPatch + 1;
            
            if (!isMajor && !isMinor && !isPatch) {
              const validOptions = [
                `${prevMajor}.${prevMinor}.${prevPatch + 1} (patch)`,
                `${prevMajor}.${prevMinor + 1}.0 (minor)`,
                `${prevMajor + 1}.0.0 (major)`
              ];
              
              core.setFailed(
                `❌ Invalid version increment!\n\n` +
                `Current: ${prevVersion}\n` +
                `Attempted: ${newVersion}\n\n` +
                `Valid options:\n${validOptions.map(v => `  • ${v}`).join('\n')}`
              );
            }
            
            console.log(`✅ Valid version increment: ${prevVersion} → ${newVersion}`);

  build_dotnet_libs:
    runs-on: windows-latest
    needs: validate_version
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Prepare NuGet cache directory
        run: |
          # Create directory if it doesn't exist
          mkdir -Force "C:\Users\runneradmin\.nuget\packages"

          # Get and report actual NuGet packages location
          dotnet nuget locals global-packages --list
        shell: pwsh

      - name: Setup NuGet cache
        id: cache-msbuild
        uses: actions/cache@v5
        with:
          path: |
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET cache
        id: cache-dotnet
        uses: actions/cache@v5
        with:
          path: src-tauri/libs/
          key: ${{ runner.os }}-dotnet-${{ hashFiles('src-tauri/libs/**/*.cs', 'src-tauri/libs/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Build .NET libraries
        if: steps.cache-dotnet.outputs.cache-hit != 'true' || github.event.inputs.force_dotnet_build == 'true'
        run: MSBuild.exe .\libs\SteamUtility.csproj
        shell: pwsh

      - name: Upload built .NET libraries
        uses: actions/upload-artifact@v6
        with:
          name: dotnet-libs
          path: src-tauri/libs/
          retention-days: 1

  build_release_bundle:
    needs: [build_dotnet_libs, validate_version]
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Force clean npm cache
        if: github.event.inputs.force_npm_install == 'true'
        run: |
          echo "Forcing fresh npm install"
          npm cache clean --force

      - name: Install dependencies (npm)
        run: npm ci --prefer-offline --no-audit --progress=false

      - name: Setup Next.js cache
        id: cache-nextjs
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**.[jt]sx', '**.[jt]s', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Clean Next.js cache
        if: steps.cache-nextjs.outputs.cache-hit != 'true' || github.event.inputs.force_nextjs_build == 'true'
        run: |
          if (Test-Path ".next") {
            Remove-Item -Recurse -Force .next
            Write-Host "Next.js cache cleared"
          } else {
            Write-Host "No Next.js cache found"
          }
        shell: pwsh

      - name: Setup Rust cache
        id: cache-rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Clean Cargo artifacts
        if: steps.cache-rust.outputs.cache-hit != 'true' || github.event.inputs.force_cargo_clean == 'true'
        run: cargo clean
        working-directory: ./src-tauri
        
      - name: Update version numbers
        id: update-versions
        run: |
          $previousVersion = "${{ needs.validate_version.outputs.previous_version }}"
          $newVersion = "${{ needs.validate_version.outputs.new_version }}"

          # update tauri.conf.json version
          $tauriConfJson = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $tauriConfJson.version = $newVersion
          $tauriConfJson | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          # update latest.json version & url
          $latestJson = Get-Content latest.json | ConvertFrom-Json
          $latestJson.version = $newVersion
          $latestJson.platforms.'windows-x86_64'.url = $latestJson.platforms.'windows-x86_64'.url -replace [regex]::Escape($previousVersion), $newVersion
          $latestJson | ConvertTo-Json -Depth 10 | Set-Content latest.json

      - name: Create .env.production file
        run: |
          @"
          KEY=$env:KEY
          STEAM_DEV_ACCOUNTS=$env:STEAM_DEV_ACCOUNTS
          "@ | Set-Content .env.production
        shell: pwsh
        env:
          KEY: ${{ secrets.KEY }}
          STEAM_DEV_ACCOUNTS: ${{ secrets.STEAM_DEV_ACCOUNTS }}

      - name: Download built .NET libraries
        uses: actions/download-artifact@v7
        with:
          name: dotnet-libs
          path: src-tauri/libs/

      - name: Build and package Tauri app
        if: steps.update-versions.outcome == 'success'
        run: |
          npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_CI: "1"
          NEXT_TELEMETRY_DISABLED: "1"

        shell: pwsh

      - name: Update latest.json with signature
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const newVersion = process.env.NEW_VERSION;
            const isMajorInput = process.env.IS_MAJOR;

            const sigPath = path.resolve(`./src-tauri/target/release/bundle/nsis/Steam Game Idler_${newVersion}_x64-setup.exe.sig`);
            const latestJsonPath = path.resolve('./latest.json');

            const newSignature = fs.readFileSync(sigPath, 'utf-8').trim();
            const latestJson = JSON.parse(fs.readFileSync(latestJsonPath, 'utf-8'));

            latestJson.platforms['windows-x86_64'].signature = newSignature;
            latestJson.major = isMajorInput === 'true';

            fs.writeFileSync(latestJsonPath, JSON.stringify(latestJson, null, 2));

            console.log('Updated latest.json with new signature');
        env:
          NEW_VERSION: ${{ needs.validate_version.outputs.new_version }}
          IS_MAJOR: ${{ github.event.inputs.is_major }}

      - uses: actions/create-github-app-token@v2
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PR for version changes
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: "chore(version): bump to ${{ needs.validate_version.outputs.new_version }}"
          title: "chore(version): bump to ${{ needs.validate_version.outputs.new_version }}"
          body: |
            Automated version bump for release [v${{ needs.validate_version.outputs.new_version }}](https://github.com/Autapomorph/steam-game-idler/releases/tag/${{ needs.validate_version.outputs.new_version }})

            Generated by workflow run [${{ github.run_id }}](https://github.com/Autapomorph/steam-game-idler/actions/runs/${{ github.run_id }})

            Merging this PR allows the release to be distributed through Tauri Updater for auto-updates
          branch: "version-bump-${{ needs.validate_version.outputs.new_version }}-${{ github.run_id }}"
          base: "main"
          add-paths: |
            src-tauri/tauri.conf.json
            latest.json
          sign-commits: true

      - name: Generate release notes
        id: generate_notes
        uses: actions/github-script@v8
        with:
          script: |
            const { data } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ needs.validate_version.outputs.new_version }}',
              previous_tag_name: '${{ needs.validate_version.outputs.previous_version }}'
            });
            
            // Remove lines for version bumps, docs, ci, and chore(ci)
            let body = data.body;
            const lines = body.split('\n');
            const filtered = lines.filter(line => {
              const trimmed = line.trim();
              if (trimmed.startsWith('* chore: update changelog')) return false;
              if (trimmed.startsWith('* chore(version): bump to')) return false;
              if (trimmed.startsWith('* chore: push notification')) return false;
              if (trimmed.startsWith('* chore(i18n): pull translations from crowdin')) return false;
              if (trimmed.startsWith('* chore(ci):')) return false;
              if (trimmed.startsWith('* ci:')) return false;
              if (trimmed.startsWith('* docs:')) return false;
              return true;
            });
            
            const cleanedBody = filtered.join('\n');
            
            // Save to file
            const fs = require('fs');
            fs.writeFileSync('./release_notes.md', cleanedBody);
            
            console.log('Generated release notes:');
            console.log(cleanedBody);
            
            return cleanedBody;

      - name: Prepare portable executable
        run: |
          # Create portable package directory
          $portableDir = "./portable-package"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          # Copy the executable with the correct name
          Copy-Item "./src-tauri/target/release/Steam Game Idler.exe" -Destination "$portableDir/Steam Game Idler.exe"
          
          # Copy the libs folder
          Copy-Item "./src-tauri/libs" -Destination "$portableDir/libs" -Recurse -Force

          # Copy the LICENSE file
          Copy-Item "./LICENSE" -Destination "$portableDir/LICENSE" -Force
          
          # Create the portable zip
          Compress-Archive -Path "$portableDir/*" -DestinationPath "./src-tauri/target/release/Steam Game Idler_${{ needs.validate_version.outputs.new_version }}_x64-portable.zip" -Force
          
          # Clean up temporary directory
          Remove-Item -Recurse -Force $portableDir
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.validate_version.outputs.new_version }}
          name: v${{ needs.validate_version.outputs.new_version }}
          body_path: ./release_notes.md
          files: |
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.validate_version.outputs.new_version }}_x64-setup.exe
            ./src-tauri/target/release/bundle/nsis/Steam Game Idler_${{ needs.validate_version.outputs.new_version }}_x64-setup.exe.sig
            ./src-tauri/target/release/Steam Game Idler_${{ needs.validate_version.outputs.new_version }}_x64-portable.zip

      - name: Cleanup artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: dotnet-libs